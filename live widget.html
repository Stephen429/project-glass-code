<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }
    </style>
</head>
<body class="bg-transparent p-2">

    <!-- Metrics Grid Layout Frame -->
    <div id="metrics-container" class="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- Shimmering Loading Placeholders -->
        <div class="animate-pulse bg-white border border-slate-200 rounded-xl p-4 text-center">
            <div class="h-3 bg-slate-200 rounded w-1/2 mx-auto mb-3"></div>
            <div class="h-6 bg-slate-300 rounded w-1/3 mx-auto"></div>
        </div>
        <div class="animate-pulse bg-white border border-slate-200 rounded-xl p-4 text-center">
            <div class="h-3 bg-slate-200 rounded w-1/2 mx-auto mb-3"></div>
            <div class="h-6 bg-slate-300 rounded w-1/3 mx-auto"></div>
        </div>
        <div class="animate-pulse bg-white border border-slate-200 rounded-xl p-4 text-center">
            <div class="h-3 bg-slate-200 rounded w-1/2 mx-auto mb-3"></div>
            <div class="h-6 bg-slate-300 rounded w-1/3 mx-auto"></div>
        </div>
        <div class="animate-pulse bg-white border border-slate-200 rounded-xl p-4 text-center">
            <div class="h-3 bg-slate-200 rounded w-1/2 mx-auto mb-3"></div>
            <div class="h-6 bg-slate-300 rounded w-1/3 mx-auto"></div>
        </div>
    </div>

    <script>
        // 1. Paste your base published Google Sheet CSV URL here
        const BASE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        
        // 2. Paste the specific GID number for your METRICS tab here
        const METRICS_TAB_GID = "1647929887";

        function parseCSV(text) {
            let lines = []; let row = [""]; let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let n = text[i+1];
                if (c === '"') { if (q && n === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && n === '\n') i++; lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row); return lines;
        }

        async function fetchMetrics() {
            const container = document.getElementById("metrics-container");
            
            // Local fallback simulation if configuration isn't wired yet
            if (BASE_SHEET_URL.includes("YOUR_BASE_PUBLISHED_CSV")) {
                renderMetrics([
                    ["Active Resolutions", "12"],
                    ["Council Projects", "8"],
                    ["Letters Processed", "45"],
                    ["Portal Status", "100%"]
                ]);
                return;
            }

            try {
                const response = await fetch(`${BASE_SHEET_URL}&gid=${METRICS_TAB_GID}`);
                const rawData = await response.text();
                const rows = parseCSV(rawData);
                
                let metricsData = [];
                // Start at index 1 to skip column header row
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length >= 2 && rows[i][0].trim()) {
                        metricsData.push([rows[i][0].trim(), rows[i][1].trim()]);
                    }
                }
                renderMetrics(metricsData);
            } catch (error) {
                console.error("Metrics sync error:", error);
                container.innerHTML = `<div class="col-span-full text-center text-xs text-red-500 font-medium py-4 bg-white border border-red-100 rounded-xl">Failed to synchronize ledger key metrics.</div>`;
            }
        }

        function renderMetrics(data) {
            const container = document.getElementById("metrics-container");
            container.innerHTML = "";
            
            data.forEach(item => {
                const name = item[0];
                const value = item[1];
                
                // Use a distinct style tint if the value is a status percentage indicator
                const isStatus = value.includes("%") || name.toLowerCase().includes("status");
                const valueColorClass = isStatus ? "text-emerald-600 font-semibold" : "text-slate-900 font-bold";

                container.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-xl p-4 text-center shadow-sm hover:shadow-md transition-all duration-200">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1 truncate">${name}</span>
                        <span class="text-xl md:text-2xl tracking-tight ${valueColorClass}">${value}</span>
                    </div>
                `;
            });
        }

        window.onload = fetchMetrics;
    </script>
</body>
              </html>
