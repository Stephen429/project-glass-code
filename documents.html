<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Official Documents | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Zero-flash logo logic */
        #header-logo { display: none; }
        .logo-loaded #header-logo { display: block; }
        .logo-loaded #header-text { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="border-b border-slate-100 sticky top-0 z-50 bg-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a id="logo-link" href="#" class="flex items-center">
                <div id="logo-container" class="flex items-center">
                    <img id="header-logo" src="" class="h-8" alt="Logo">
                    <span id="header-text" class="text-xl font-black tracking-tighter">PROJECT<span class="text-blue-600">GLASS</span></span>
                </div>
            </a>
            <nav id="nav-links" class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500"></nav>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-100 bg-white p-4 space-y-4 text-xs font-bold uppercase text-slate-500 flex flex-col"></div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-8 fade-in">
        <h1 class="text-3xl font-black mb-2">Documents & Gazettes</h1>
        <p class="text-slate-500 text-sm mb-8">Access official publications, reports, and documented gazettes.</p>
        
        <div id="tab-group" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-10 text-xs font-bold uppercase">
            <button onclick="setActiveTab('RESOLUTIONS', 'RESOLUTION NO.')" id="btn-RESOLUTIONS" class="px-4 py-3 rounded-lg bg-white border text-blue-600 shadow-sm transition-all">Resolutions</button>
            <button onclick="setActiveTab('MINUTES', 'MEETING NO.')" id="btn-MINUTES" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Minutes</button>
            <button onclick="setActiveTab('PROPOSALS', 'PROPOSAL NO.')" id="btn-PROPOSALS" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Proposals</button>
            <button onclick="setActiveTab('REPORTS', 'DOC NO.')" id="btn-REPORTS" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Reports</button>
        </div>

        <section class="bg-white border rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                        <th id="col-header-id" class="py-4 px-6 w-1/4">ID</th>
                        <th class="py-4 px-6 w-1/2">Title</th>
                        <th class="py-4 px-6 w-1/4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="document-table-body" class="divide-y text-sm"></tbody>
            </table>
            <div id="loader" class="text-center py-10 text-slate-400 font-bold uppercase text-xs animate-pulse">Syncing Cloud Database...</div>
        </section>
    </main>

    <footer class="border-t bg-white mt-12 py-8">
        <div class="max-w-4xl mx-auto px-4 text-center text-xs font-bold uppercase text-slate-400">
            <p>&copy; 2026 Project GLASS. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const CONFIG_GID = "229901204";
        const GID_MAPPING = { "RESOLUTIONS": "0", "MINUTES": "1455822320", "PROPOSALS": "907328997", "REPORTS": "1385718104" };

        async function init() {
            // 1. Setup Header Independent of Database
            const confRes = await fetch(`${CSV_URL}&gid=${CONFIG_GID}`);
            const data = (await confRes.text()).split('\n').map(r => r.split(','));
            const config = Object.fromEntries(data.map(r => [r[0]?.trim(), r[1]?.trim()]));
            
            const logo = document.getElementById('header-logo');
            if(config['IMG_LOGO_URL']) { 
                logo.src = config['IMG_LOGO_URL']; 
                document.getElementById('logo-container').classList.add('logo-loaded');
            }
            
            const path = window.location.pathname.split("/").pop() || 'index.html';
            const pages = [
                {name:'Home', file:'index.html'}, {name:'Gazettes', file:'documents.html'}, 
                {name:'Officers', file:'officers-and-committees.html'}, {name:'Feedback', file:'feedback.html'}
            ];
            
            pages.forEach(p => {
                const isActive = path === p.file;
                const cls = isActive ? "text-blue-600 font-bold" : "text-slate-500 hover:text-blue-600";
                document.getElementById('nav-links').innerHTML += `<a href="${p.file}" class="${cls}">${p.name}</a>`;
                document.getElementById('mobile-menu').innerHTML += `<a href="${p.file}" class="block py-2 ${cls}">${p.name}</a>`;
            });

            // 2. Load Content
            setActiveTab('RESOLUTIONS', 'RESOLUTION NO.');
        }

        async function setActiveTab(cat, label) {
            document.querySelectorAll('#tab-group button').forEach(b => {
                b.className = b.id === 'btn-'+cat ? "px-4 py-3 rounded-lg bg-white border-2 border-blue-600 text-blue-600 shadow-sm transition-all" : "px-4 py-3 rounded-lg bg-slate-100 border text-slate-600 transition-all";
            });
            document.getElementById('col-header-id').innerText = label;
            
            const tbody = document.getElementById('document-table-body');
            const loader = document.getElementById('loader');
            tbody.innerHTML = '';
            loader.classList.remove('hidden');

            const res = await fetch(`${CSV_URL}&gid=${GID_MAPPING[cat]}`);
            const rows = (await res.text()).split('\n').map(r => r.split(','));
            loader.classList.add('hidden');

            rows.slice(1).forEach(r => {
                if(!r[0]?.trim()) return;
                tbody.innerHTML += `<tr class="hover:bg-slate-50">
                    <td class="py-4 px-6 font-mono text-xs text-blue-600 font-bold">${r[0]}</td>
                    <td class="py-4 px-6 text-slate-800 font-medium">${r[1]}</td>
                    <td class="py-4 px-6 text-right"><a href="${r[2]}" target="_blank" class="text-blue-600 font-bold underline text-xs">VIEW</a></td>
                </tr>`;
            });
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
