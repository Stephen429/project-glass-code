<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Official Documents | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #header-logo { display: none; }
        .logo-loaded #header-logo { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="border-b border-slate-100 sticky top-0 z-50 bg-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a id="logo-link" href="#" class="flex items-center">
                <img id="header-logo" src="" class="h-8" alt="Logo">
            </a>
            <nav id="nav-links" class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500"></nav>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 text-slate-600"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-100 bg-white px-4 py-2 space-y-1 text-xs font-bold uppercase text-slate-500 flex flex-col"></div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-8 fade-in w-full overflow-hidden">
        <h1 class="text-3xl font-black mb-2">Documents & Gazettes</h1>
        <p class="text-slate-500 text-sm mb-8">Access official publications, reports, and documented gazettes.</p>
        
        <section class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="search-input" onkeyup="renderTable()" placeholder="Search by title or ID..." class="flex-grow px-4 py-2.5 rounded-lg border text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <select id="year-filter" onchange="renderTable()" class="px-4 py-2.5 rounded-lg border text-sm bg-slate-50 text-slate-600 outline-none">
                    <option value="ALL">All Years</option>
                </select>
            </div>
        </section>

        <div id="tab-group" class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-10 text-xs font-bold uppercase">
            <button onclick="setActiveTab('RESOLUTIONS', 'RESOLUTION NO.')" id="btn-RESOLUTIONS" class="px-4 py-3 rounded-lg bg-white border text-blue-600 shadow-sm transition-all">Resolutions</button>
            <button onclick="setActiveTab('MINUTES', 'MEETING NO.')" id="btn-MINUTES" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Minutes</button>
            <button onclick="setActiveTab('PROPOSALS', 'PROPOSAL NO.')" id="btn-PROPOSALS" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Proposals</button>
            <button onclick="setActiveTab('REPORTS', 'DOC NO.')" id="btn-REPORTS" class="px-4 py-3 rounded-lg bg-white border text-slate-600 transition-all">Reports</button>
        </div>

        <section class="bg-white border rounded-2xl shadow-sm overflow-hidden w-full">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                        <th id="col-header-id" class="py-4 px-4 w-1/4">ID</th>
                        <th class="py-4 px-4 w-1/2">Title</th>
                        <th class="py-4 px-4 w-1/4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="document-table-body" class="divide-y text-sm"></tbody>
            </table>
            <div id="loader" class="text-center py-10 text-slate-400 font-bold uppercase text-xs animate-pulse hidden">Syncing Cloud Database...</div>
        </section>
    </main>

    <script>
        let rawData = [];
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const CONFIG_GID = "229901204";
        const GID_MAPPING = { "RESOLUTIONS": "0", "MINUTES": "1455822320", "PROPOSALS": "907328997", "REPORTS": "1385718104" };

        async function init() {
        const confRes = await fetch(`${CSV_URL}&gid=${CONFIG_GID}`);
        const data = (await confRes.text()).split('\n').map(r => r.split(','));
        const config = Object.fromEntries(data.map(r => [r[0]?.trim(), r[1]?.trim()]));
        
        // Header Logo Setup
        const logo = document.getElementById('header-logo');
        if(config['IMG_LOGO_URL']) { logo.src = config['IMG_LOGO_URL']; logo.parentElement.parentElement.classList.add('logo-loaded'); }
        document.getElementById('logo-link').href = config['LINK_0_PATH'] || 'index.html';
        
        // Navigation Mapping (Includes About Us as Link_5)
        const path = window.location.pathname.split("/").pop();
        const pages = [
            {name:'Home', id:'0'}, 
            {name:'Gazettes', id:'1'}, 
            {name:'Officers', id:'2'}, 
            {name:'Feedback', id:'3'},
            {name:'About Us', id:'5'}
        ];
        
        pages.forEach(p => {
            const url = config[`LINK_${p.id}_PATH`] || '#';
            // Highlights if the current URL matches or if we are on a subpage of that section
            const isActive = url.includes(path) || (p.name === 'Gazettes' && path.includes('document'));
            const cls = isActive ? "text-blue-600 font-bold" : "text-slate-500 hover:text-blue-600";
            
            document.getElementById('nav-links').innerHTML += `<a href="${url}" class="${cls} text-sm">${p.name}</a>`;
            document.getElementById('mobile-menu').innerHTML += `<a href="${url}" class="block py-3 px-2 ${cls} border-b border-slate-50">${p.name}</a>`;
        });
            setActiveTab('RESOLUTIONS', 'RESOLUTION NO.');
        }

        async function setActiveTab(cat, label) {
            document.querySelectorAll('#tab-group button').forEach(b => {
                b.className = b.id === 'btn-'+cat ? "px-2 py-3 rounded-lg bg-white border-2 border-blue-600 text-blue-600 shadow-sm transition-all text-[10px] md:text-xs" : "px-2 py-3 rounded-lg bg-slate-100 border text-slate-600 transition-all text-[10px] md:text-xs";
            });
            document.getElementById('col-header-id').innerText = label;
            
            // Clear UI immediately
            document.getElementById('document-table-body').innerHTML = '';
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            const res = await fetch(`${CSV_URL}&gid=${GID_MAPPING[cat]}`);
            const text = await res.text();
            
            rawData = text.split('\n').slice(1).map(row => {
                const cols = row.split(',');
                return { id: cols[0], title: cols[1], link: cols[2], year: cols[3]?.trim() || '2026' };
            });
            
            updateYearFilter();
            loader.classList.add('hidden');
            renderTable();
        }

        function updateYearFilter() {
            const select = document.getElementById('year-filter');
            const currentVal = select.value;
            const years = [...new Set(rawData.map(d => d.year))].sort((a,b) => b-a);
            select.innerHTML = '<option value="ALL">All Years</option>';
            years.forEach(y => {
                select.innerHTML += `<option value="${y}" ${currentVal === y ? 'selected' : ''}>${y}</option>`;
            });
        }

        function renderTable() {
            const tbody = document.getElementById('document-table-body');
            const search = document.getElementById('search-input').value.toLowerCase();
            const year = document.getElementById('year-filter').value;
            
            tbody.innerHTML = rawData
                .filter(d => (d.title?.toLowerCase().includes(search) || d.id?.toLowerCase().includes(search)) && (year === 'ALL' || d.year === year))
                .map(d => `
                    <tr class="hover:bg-slate-50">
                        <td class="py-4 px-4 font-mono text-xs text-blue-600 font-bold">${d.id || ''}</td>
                        <td class="py-4 px-4 text-slate-800 font-medium whitespace-normal">${d.title || ''}</td>
                        <td class="py-4 px-4 text-right"><a href="${d.link}" target="_blank" class="text-blue-600 font-bold underline text-xs">VIEW</a></td>
                    </tr>
                `).join('');
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
