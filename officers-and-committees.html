<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers & Committees | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen antialiased flex flex-col">

    <!-- SECTION 1: DYNAMIC HERO HEADER (IMAGE ONLY) -->
    <div id="hero-header" class="relative text-white py-6 px-6 md:px-12 text-center overflow-hidden border-b border-blue-800 shadow-inner bg-gradient-to-r from-blue-900 via-indigo-950 to-slate-950">
        <img id="header-bg-image-layer" src="" alt="" class="absolute inset-0 w-full h-full object-cover opacity-100 pointer-events-none z-0 hidden">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#3b82f6_1px,transparent_1px)] [background-size:16px_16px] z-0"></div>

        <!-- IMAGE HEADER CONTAINER (Active by default) -->
        <div id="header-image-container" class="relative max-w-5xl mx-auto z-10 flex justify-center items-center">
            <img id="config-header-banner" src="" alt="Portal Banner" class="max-h-48 md:max-h-64 object-contain rounded-lg drop-shadow-lg">
        </div>
    </div>

    <!-- MAIN DIRECTORY LAYER -->
    <div class="max-w-6xl w-full mx-auto px-4 py-8 space-y-6 flex-grow">
        
        <!-- SECTION TITLE HEADER -->
        <div class="border-b border-slate-200 pb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 tracking-tight">Officers & Working Committees</h2>
                <p class="text-xs text-slate-500 mt-1">Official directory of the Supreme Secondary Learner Government council members.</p>
            </div>
            <!-- BACK TO DASHBOARD SHORTCUT -->
            <a href="/" target="_parent" class="inline-flex items-center space-x-1.5 text-xs font-bold text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100/80 px-3 py-1.5 rounded-lg transition-colors self-start sm:self-center">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                <span>Dashboard</span>
            </a>
        </div>

        <!-- UNRESTRICTED GRID CONTAINER -->
        <div id="full-officers-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Loading Feedback Placeholder Card State -->
            <div class="animate-pulse bg-white border border-slate-200 rounded-xl p-4 flex items-center space-x-4 col-span-full justify-center text-slate-400 text-xs">
                <span>Syncing organizational rosters...</span>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURATION SETUP
        // ==========================================
        const MASTER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv"; 
        
        const CONFIG_TAB_GID = "229901204";
        const ROSTER_TAB_GID = "416625956";

        const AVATAR_PLACEHOLDER = `<svg class="w-7 h-7 text-slate-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

        function parseCSV(text) {
            let lines = []; let row = [""]; let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let n = text[i+1];
                if (c === '"') { if (q && n === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && n === '\n') i++; lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row); return lines;
        }

        async function initDirectoryPage() {
            if (MASTER_SHEET_URL === "" || MASTER_SHEET_URL.includes("PASTE_YOUR_LINK_HERE")) {
                document.getElementById("full-officers-grid").innerHTML = `
                    <div class="bg-white border border-slate-200 rounded-xl p-6 text-center col-span-full text-xs font-medium text-slate-500">
                        Please connect your master spreadsheet URL to load the complete student council array.
                    </div>`;
                return;
            }

            // 1. Setup Theme Configurations
            try {
                const res = await fetch(`${MASTER_SHEET_URL}&gid=${CONFIG_TAB_GID}`);
                const data = parseCSV(await res.text());
                let configMap = {};
                for(let i=1; i<data.length; i++) {
                    if(data[i].length >= 2 && data[i][0].trim()) configMap[data[i][0].trim()] = data[i][1].trim();
                }
                
                const heroHeader = document.getElementById("hero-header");
                const bgImageElement = document.getElementById("header-bg-image-layer");
                
                // Set Header Background Image or fallback to Gradient Background color
                if(configMap['HEADER_BG_IMAGE'] && configMap['HEADER_BG_IMAGE'] !== "") {
                    bgImageElement.src = configMap['HEADER_BG_IMAGE'];
                    bgImageElement.classList.remove("hidden");
                    heroHeader.className = "relative text-white py-6 px-6 md:px-12 text-center overflow-hidden border-b border-blue-800 shadow-inner bg-slate-900";
                } else {
                    bgImageElement.classList.add("hidden");
                    if(configMap['HEADER_BG_COLOR'] && configMap['HEADER_BG_COLOR'] !== "") {
                        heroHeader.className = `relative text-white py-6 px-6 md:px-12 text-center overflow-hidden border-b border-blue-800 shadow-inner bg-gradient-to-r ${configMap['HEADER_BG_COLOR']}`;
                    }
                }

                // Directly assign banner graphic
                if(configMap['HEADER_IMAGE_BANNER']) {
                    document.getElementById("config-header-banner").src = configMap['HEADER_IMAGE_BANNER'];
                }
            } catch (e) { console.error("Theme config sync exception:", e); }

            // 2. Load and Render EVERY Officer Entry Uncapped
            try {
                const res = await fetch(`${MASTER_SHEET_URL}&gid=${ROSTER_TAB_GID}`);
                const data = parseCSV(await res.text());
                let fullRoster = [];
                for(let i=1; i<data.length; i++) {
                    if(data[i].length >= 2 && data[i][0].trim()) {
                        fullRoster.push([data[i][0].trim(), data[i][1].trim(), data[i][2] ? data[i][2].trim() : ""]);
                    }
                }
                renderFullRosterGrid(fullRoster);
            } catch (e) { 
                document.getElementById("full-officers-grid").innerHTML = `
                    <div class="bg-red-50 border border-red-200 text-red-700 font-medium rounded-xl p-4 text-center col-span-full text-xs">
                        Failed to accurately compile roster records. Validate your tab GID setup configurations.
                    </div>`;
            }
        }

        function renderFullRosterGrid(data) {
            const grid = document.getElementById("full-officers-grid");
            grid.innerHTML = "";

            if(data.length === 0) {
                grid.innerHTML = `
                    <div class="bg-white border border-slate-200 rounded-xl p-6 text-center col-span-full text-xs font-medium text-slate-400">
                        No active records populated in your sheet directory yet.
                    </div>`;
                return;
            }

            data.forEach(officer => {
                const name = officer[0]; const role = officer[1]; const imgUrl = officer[2];
                const avatarFrameContent = imgUrl 
                    ? `<img src="${imgUrl}" alt="${name}" class="w-full h-full object-cover relative z-10">` 
                    : AVATAR_PLACEHOLDER;

                grid.innerHTML += `
                    <div class="bg-white border border-slate-200 rounded-xl p-3.5 flex items-center space-x-4 shadow-sm hover:border-blue-500 hover:shadow-md transition-all duration-200 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-blue-50/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
                        <div class="w-12 h-12 bg-gradient-to-br from-slate-100 to-slate-200/60 rounded-lg border border-slate-200/80 shadow-inner overflow-hidden flex items-center justify-center flex-shrink-0 relative">
                            ${avatarFrameContent}
                        </div>
                        <div class="flex-grow min-w-0 z-10">
                            <h4 class="font-bold text-slate-800 text-xs md:text-sm tracking-tight truncate">${name}</h4>
                            <p class="text-[10px] md:text-xs font-semibold text-blue-600 uppercase tracking-wider mt-0.5 truncate">${role}</p>
                        </div>
                    </div>`;
            });
        }

        window.onload = initDirectoryPage;
    </script>
</body>
  </html>
