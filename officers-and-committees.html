<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers & Committees | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="border-b border-slate-100 sticky top-0 z-50 bg-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center">
                <span class="text-xl font-black tracking-tighter">PROJECT<span class="text-blue-600">GLASS</span></span>
            </a>
            <nav class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500">
                <a href="index.html">Home</a>
                <a id="nav-1" href="#">Gazettes</a>
                <a id="nav-2" href="#">Officers</a>
                <a id="nav-3" href="#">Feedback</a>
                <a id="nav-4" href="#">Clubs</a>
            </nav>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-100 bg-white p-4 space-y-4 text-xs font-bold uppercase text-slate-500 flex flex-col">
            <a href="index.html">Home</a>
            <a id="mnav-1" href="#">Gazettes</a>
            <a id="mnav-2" href="#">Officers</a>
            <a id="mnav-3" href="#">Feedback</a>
            <a id="mnav-4" href="#">Clubs</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <section class="mb-12">
            <h1 class="text-4xl font-black tracking-tight mb-2">Officers & Committees</h1>
            <div class="flex flex-col sm:flex-row gap-1 mt-8 p-1 bg-slate-50 border border-slate-100 rounded-2xl w-full sm:w-fit">
                <button onclick="showTab('executive')" id="btn-executive" class="px-5 py-2 rounded-xl font-bold text-[10px] uppercase bg-white text-blue-600 shadow-sm transition-all w-full sm:w-auto">Executives</button>
                <button onclick="showTab('representatives')" id="btn-representatives" class="px-5 py-2 rounded-xl font-bold text-[10px] uppercase text-slate-500 hover:text-slate-900 transition-all w-full sm:w-auto">Representatives</button>
                <button onclick="showTab('committees')" id="btn-committees" class="px-5 py-2 rounded-xl font-bold text-[10px] uppercase text-slate-500 hover:text-slate-900 transition-all w-full sm:w-auto">Committees</button>
            </div>
        </section>

        <div id="panel-executive" class="dir-tab-panel space-y-10">
            <div id="row-pres" class="flex justify-center"></div>
            <div id="exec-grid-target" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>

        <div id="panel-representatives" class="dir-tab-panel hidden grid grid-cols-1 md:grid-cols-3 gap-4">
            <div id="rep-g7-8" class="bg-slate-50 p-5 rounded-2xl border border-slate-100"></div>
            <div id="rep-g9-10" class="bg-slate-50 p-5 rounded-2xl border border-slate-100"></div>
            <div id="rep-g11-12" class="bg-slate-50 p-5 rounded-2xl border border-slate-100"></div>
        </div>

        <div id="panel-committees" class="dir-tab-panel hidden space-y-4">
            <div id="committee-accordion-target" class="space-y-4"></div>
        </div>
    </main>

    <footer class="border-t border-slate-100 py-12 text-center text-slate-400">
        <p class="text-xs font-bold uppercase">&copy; 2026 Project GLASS | Supreme Secondary Learner Government</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const GID_ROSTER = "416625956";
        const CONFIG_GID = "229901204";

        async function init() {
            const confRes = await fetch(`${CSV_URL}&gid=${CONFIG_GID}`);
            const confData = (await confRes.text()).split('\n').map(r => r.split(','));
            const config = Object.fromEntries(confData.map(r => [r[0]?.trim(), r[1]?.trim()]));
            ['nav', 'mnav'].forEach(p => {
                ['1','2','3','4'].forEach(n => {
                    const el = document.getElementById(`${p}-${n}`);
                    if(el && config[`LINK_${n}_PATH`]) el.href = config[`LINK_${n}_PATH`];
                });
            });
            fetchRoster();
        }

        function showTab(t) {
            document.querySelectorAll('.dir-tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + t).classList.remove('hidden');
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.className = "px-5 py-2 rounded-xl font-bold text-[10px] uppercase text-slate-500 hover:text-slate-900 transition-all w-full sm:w-auto");
            document.getElementById('btn-' + t).className = "px-5 py-2 rounded-xl font-bold text-[10px] uppercase bg-white text-blue-600 shadow-sm transition-all w-full sm:w-auto";
        }

        function processCSV(text) {
            let lines = [], row = [""], inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i], next = text[i+1];
                if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (c === ',' && !inQuotes) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') i++; lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            return lines;
        }

        async function fetchRoster() {
            const res = await fetch(`${CSV_URL}&gid=${GID_ROSTER}`);
            const rows = processCSV(await res.text());
            let execList = [], repsList = [];

            for(let i = 1; i < rows.length; i++) {
                if(!rows[i][0]) continue;
                let role = rows[i][1]?.toLowerCase() || "";
                let person = { name: rows[i][0].trim(), role: rows[i][1]?.trim(), img: rows[i][2]?.trim() };
                if (role.includes('president') || role.includes('secretary') || role.includes('treasurer') || role.includes('auditor') || role.includes('pio')) execList.push(person);
                else if (role.includes('rep') || role.includes('grade')) repsList.push(person);
            }

            const pres = execList.find(p => p.role.toLowerCase().includes('president') && !p.role.toLowerCase().includes('vice'));
            document.getElementById('row-pres').innerHTML = pres ? `<div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center w-64"><div class="w-24 h-24 bg-slate-100 rounded-full mx-auto mb-4 overflow-hidden"><img src="${pres.img}" class="w-full h-full object-cover"></div><h4 class="font-bold text-sm">${pres.name}</h4><p class="text-[10px] text-blue-600 font-bold uppercase">${pres.role}</p></div>` : "";
            document.getElementById('exec-grid-target').innerHTML = execList.filter(p => p !== pres).map(e => `<div class="bg-white p-6 rounded-3xl border border-slate-100 text-center"><h4 class="font-bold text-sm">${e.name}</h4><p class="text-[10px] text-blue-600 font-bold uppercase">${e.role}</p></div>`).join('');
            
            const renderRep = (list) => list.map(r => `<div class="mb-3"><div class="text-sm font-bold text-slate-900 leading-tight">${r.name}</div><div class="text-[10px] uppercase font-bold text-blue-600">${r.role}</div></div>`).join('');
            document.getElementById('rep-g7-8').innerHTML = `<h3 class="text-[10px] font-black text-slate-400 uppercase mb-3">Grades 7-8</h3>` + renderRep(repsList.filter(r => r.role.match(/[78]/)));
            document.getElementById('rep-g9-10').innerHTML = `<h3 class="text-[10px] font-black text-slate-400 uppercase mb-3">Grades 9-10</h3>` + renderRep(repsList.filter(r => r.role.match(/[9]|10/)));
            document.getElementById('rep-g11-12').innerHTML = `<h3 class="text-[10px] font-black text-slate-400 uppercase mb-3">Grades 11-12</h3>` + renderRep(repsList.filter(r => r.role.match(/11|12/)));
            
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
