<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers & Committees | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="border-b border-slate-100 bg-white sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center text-xl font-black tracking-tighter">PROJECT<span class="text-blue-600">GLASS</span></a>
            <nav class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500">
                <a href="index.html">Home</a>
                <a href="#">Gazettes</a>
                <a href="#">Officers</a>
                <a href="#">Feedback</a>
                <a href="#">Clubs</a>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black mb-6">Officers & Committees</h1>
        
        <div id="tabs" class="flex flex-wrap gap-2 mb-8 text-xs font-bold uppercase">
            <button onclick="showTab('executive')" id="btn-executive" class="px-6 py-3 rounded-xl bg-white text-blue-600 shadow-sm border border-blue-100">Executives</button>
            <button onclick="showTab('representatives')" id="btn-representatives" class="px-6 py-3 rounded-xl bg-white text-slate-500 border border-slate-200">Representatives</button>
            <button onclick="showTab('committees')" id="btn-committees" class="px-6 py-3 rounded-xl bg-white text-slate-500 border border-slate-200">Committees</button>
        </div>

        <div id="panel-executive" class="dir-tab-panel grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        <div id="panel-representatives" class="dir-tab-panel hidden grid md:grid-cols-3 gap-8">
            <div id="rep-g7-8"></div> <div id="rep-g9-10"></div> <div id="rep-g11-12"></div>
        </div>
        <div id="panel-committees" class="dir-tab-panel hidden space-y-6"></div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const GID_ROSTER = "416625956";

        function showTab(t) {
            document.querySelectorAll('.dir-tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + t).classList.remove('hidden');
            document.querySelectorAll('#tabs button').forEach(b => {
                b.className = b.id === 'btn-'+t ? "px-6 py-3 rounded-xl bg-white text-blue-600 shadow-sm border border-blue-100" : "px-6 py-3 rounded-xl bg-white text-slate-500 border border-slate-200";
            });
        }

        async function fetchRoster() {
            const res = await fetch(`${CSV_URL}&gid=${GID_ROSTER}`);
            const rows = (await res.text()).split('\n').map(r => r.split(','));
            let execs = [], reps = {7:[], 8:[], 9:[], 10:[], 11:[], 12:[]}, comms = {};

            for(let i = 1; i < rows.length; i++) {
                let [name, role, img, commRaw] = [rows[i][0]?.trim(), rows[i][1]?.trim(), rows[i][2]?.trim(), rows[i][3]?.trim()];
                if(!name) continue;
                
                let rl = role.toLowerCase();
                if(rl.includes('president') || rl.includes('secretary') || rl.includes('treasurer') || rl.includes('auditor') || rl.includes('pio') || rl.includes('protocol')) execs.push({name, role, img});
                else if(rl.includes('grade')) {
                    let g = rl.match(/\d+/);
                    if(g && reps[g[0]]) reps[g[0]].push(name);
                }
                if(commRaw) {
                    let parts = commRaw.split(' ');
                    let pos = parts.pop();
                    let commName = parts.join(' ');
                    if(!comms[commName]) comms[commName] = {Chair:[], Co:[], Members:[]};
                    if(pos.includes('Chairperson')) comms[commName].Chair.push(name);
                    else if(pos.includes('Co-Chair')) comms[commName].Co.push(name);
                    else comms[commName].Members.push(name);
                }
            }

            // Executives
            const pres = execs.find(e => e.role.toLowerCase().includes('president'));
            document.getElementById('panel-executive').innerHTML = pres ? `<div class="col-span-2 md:col-span-4 bg-white p-6 rounded-2xl border flex items-center gap-6"><img src="${pres.img}" class="w-32 h-20 object-cover rounded-xl"><div class="text-left"><p class="font-black text-xl">${pres.name}</p><p class="text-blue-600 font-bold">${pres.role}</p></div></div>` + 
                execs.filter(e => e !== pres).map(e => `<div class="bg-white p-4 rounded-2xl border text-center"><div class="w-16 h-16 bg-slate-200 rounded-xl overflow-hidden mx-auto mb-2"><img src="${e.img}" class="w-full h-full object-cover"></div><p class="font-bold text-sm">${e.name}</p><p class="text-blue-600 text-[10px] uppercase font-bold">${e.role}</p></div>`).join('') : "";

            // Reps
            const renderG = (g1, g2) => `<h3 class="text-blue-600 font-black text-xs uppercase mb-3">Grade ${g1}</h3><ul class="mb-6">${reps[g1].map(n => `<li class="py-1 text-sm">${n}</li>`).join('')}</ul><h3 class="text-blue-600 font-black text-xs uppercase mb-3">Grade ${g2}</h3><ul>${reps[g2].map(n => `<li class="py-1 text-sm">${n}</li>`).join('')}</ul>`;
            document.getElementById('rep-g7-8').innerHTML = renderG(7, 8);
            document.getElementById('rep-g9-10').innerHTML = renderG(9, 10);
            document.getElementById('rep-g11-12').innerHTML = renderG(11, 12);

            // Committees
            const cTarget = document.getElementById('panel-committees');
            for(let name in comms) {
                cTarget.innerHTML += `<div class="bg-white border rounded-2xl p-6"><h4 class="font-black text-lg mb-4 border-b pb-2">${name}</h4>
                <p class="text-xs font-bold text-slate-500 uppercase">Chair: <span class="text-blue-600">${comms[name].Chair.join(', ') || 'TBD'}</span></p>
                <p class="text-xs font-bold text-slate-500 uppercase">Co-Chair: <span class="text-blue-600">${comms[name].Co.join(', ') || 'TBD'}</span></p>
                <div class="mt-4 pt-4 border-t"><p class="text-xs font-bold text-slate-400 uppercase mb-2">Members</p><p class="text-sm">${comms[name].Members.join(', ')}</p></div></div>`;
            }
        }
        fetchRoster();
    </script>
</body>
</html>
