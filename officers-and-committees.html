<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers & Committees | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- HEADER WITH LOGO & HAMBURGER -->
    <header class="border-b bg-white sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-tighter">PROJECT<span class="text-blue-600">GLASS</span></a>
            <nav class="hidden md:flex gap-6 text-xs font-bold uppercase text-slate-500">
                <a href="index.html">Home</a><a href="#">Gazettes</a><a href="#">Officers</a><a href="#">Feedback</a>
            </nav>
            <button onclick="document.getElementById('mobile-nav').classList.toggle('hidden')" class="md:hidden"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-nav" class="hidden md:hidden p-4 border-t text-xs font-bold uppercase space-y-3">
            <a href="index.html" class="block">Home</a><a href="#" class="block">Gazettes</a><a href="#" class="block">Officers</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black mb-8">Officers & Committees</h1>
        
        <!-- FIXED COMPRESSED TABS -->
        <div class="flex flex-wrap gap-2 mb-10">
            <button onclick="showTab('executive')" id="btn-executive" class="px-5 py-2 rounded-xl bg-white border border-blue-600 text-blue-600 font-bold text-[10px] uppercase">Executives</button>
            <button onclick="showTab('representatives')" id="btn-representatives" class="px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-500 font-bold text-[10px] uppercase">Representatives</button>
            <button onclick="showTab('committees')" id="btn-committees" class="px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-500 font-bold text-[10px] uppercase">Committees</button>
        </div>

        <div id="panel-executive" class="dir-tab-panel">
            <div id="pres-target" class="flex justify-center mb-8"></div>
            <div id="exec-grid-target" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="panel-representatives" class="dir-tab-panel hidden grid md:grid-cols-3 gap-8">
            <div id="rep-g7-8"></div><div id="rep-g9-10"></div><div id="rep-g11-12"></div>
        </div>

        <div id="panel-committees" class="dir-tab-panel hidden space-y-6"></div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        
        function showTab(t) {
            document.querySelectorAll('.dir-tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + t).classList.remove('hidden');
            document.querySelectorAll('button[id^="btn-"]').forEach(b => {
                b.className = b.id === 'btn-'+t ? "px-5 py-2 rounded-xl bg-white border border-blue-600 text-blue-600 font-bold text-[10px] uppercase" : "px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-500 font-bold text-[10px] uppercase";
            });
        }

        async function fetchRoster() {
            const res = await fetch(CSV_URL);
            const rows = (await res.text()).split('\n').map(r => r.split(','));
            let execs = [], reps = {7:[], 8:[], 9:[], 10:[], 11:[], 12:[]}, comms = {};

            for(let i = 1; i < rows.length; i++) {
                let [name, role, img, commRaw] = [rows[i][0]?.trim(), rows[i][1]?.trim(), rows[i][2]?.trim(), rows[i][3]?.trim()];
                if(!name) continue;
                
                let rl = role.toLowerCase();
                if(rl.includes('president') || rl.includes('secretary') || rl.includes('treasurer') || rl.includes('auditor') || rl.includes('pio') || rl.includes('protocol')) execs.push({name, role, img});
                else if(rl.includes('grade')) { let g = rl.match(/\d+/); if(g) reps[g[0]].push(name); }
                
                if(commRaw) {
                    let [cName, cRole] = commRaw.split(' Committee ');
                    if(!comms[cName]) comms[cName] = {chair: '', co: '', members: []};
                    if(cRole.includes('Chairperson')) comms[cName].chair = name;
                    else if(cRole.includes('Co-Chairperson')) comms[cName].co = name;
                    else comms[cName].members.push(name);
                }
            }

            // Render President
            const pres = execs.find(e => e.role.toLowerCase().includes('president'));
            document.getElementById('pres-target').innerHTML = pres ? `<div class="bg-white p-6 rounded-2xl border text-center w-60"><div class="w-24 h-24 bg-slate-200 rounded-xl overflow-hidden mx-auto mb-4"><img src="${pres.img}" class="w-full h-full object-cover"></div><p class="font-bold">${pres.name}</p><p class="text-blue-600 font-bold text-xs">${pres.role}</p></div>` : "";
            
            // Render Exec Grid
            document.getElementById('exec-grid-target').innerHTML = execs.filter(e => e !== pres).map(e => `<div class="bg-white p-4 rounded-2xl border text-center"><div class="w-16 h-16 bg-slate-200 rounded-xl overflow-hidden mx-auto mb-2"><img src="${e.img}" class="w-full h-full object-cover"></div><p class="font-bold text-xs">${e.name}</p><p class="text-blue-600 font-bold text-[9px] uppercase">${e.role}</p></div>`).join('');

            // Render Reps
            const renderG = (g1, g2) => `<h3 class="text-blue-600 font-black text-xs uppercase mb-3">Grade ${g1}</h3><ul class="mb-6">${reps[g1].map(n => `<li class="text-sm">${n}</li>`).join('')}</ul><h3 class="text-blue-600 font-black text-xs uppercase mb-3">Grade ${g2}</h3><ul>${reps[g2].map(n => `<li class="text-sm">${n}</li>`).join('')}</ul>`;
            document.getElementById('rep-g7-8').innerHTML = renderG(7, 8);
            document.getElementById('rep-g9-10').innerHTML = renderG(9, 10);
            document.getElementById('rep-g11-12').innerHTML = renderG(11, 12);

            // Render Committees
            for(let name in comms) {
                document.getElementById('panel-committees').innerHTML += `<div class="bg-white border rounded-2xl p-6"><h4 class="font-black text-lg mb-4">${name} Committee</h4><p class="text-sm font-bold">Chair: ${comms[name].chair}</p><p class="text-sm font-bold mb-4">Co-Chair: ${comms[name].co}</p><p class="text-xs font-bold text-slate-400 uppercase mb-2">Members</p><ul class="list-disc pl-4 text-sm">${comms[name].members.map(m => `<li>${m}</li>`).join('')}</ul></div>`;
            }
            lucide.createIcons();
        }
        fetchRoster();
    </script>
</body>
</html>
