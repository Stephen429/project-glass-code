<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officers & Committees | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="border-b border-slate-100 sticky top-0 z-50 bg-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center">
                <img id="header-logo" src="" class="h-8 hidden" alt="Logo">
                <span id="header-text" class="text-xl font-black tracking-tighter">PROJECT<span class="text-blue-600">GLASS</span></span>
            </a>
            <nav class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500">
                <a id="nav-home" href="index.html">Home</a>
                <a id="nav-1" href="#">Gazettes</a>
                <a id="nav-2" href="#">Officers</a>
                <a id="nav-3" href="#">Feedback</a>
                <a id="nav-4" href="#">Clubs</a>
            </nav>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-100 bg-white p-4 space-y-4 text-xs font-bold uppercase text-slate-500 flex flex-col">
            <a href="index.html">Home</a>
            <a id="mnav-1" href="#">Gazettes</a>
            <a id="mnav-2" href="#">Officers</a>
            <a id="mnav-3" href="#">Feedback</a>
            <a id="mnav-4" href="#">Clubs</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-black mb-8">Officers & Committees</h1>
        
        <div id="tab-group" class="flex justify-center bg-slate-200 p-1 rounded-lg border border-slate-300 w-full md:w-[450px] mx-auto mb-10 text-xs font-bold uppercase overflow-hidden">
            <button onclick="showTab('executive')" id="btn-executive" class="flex-1 px-4 py-3 rounded-md bg-white text-blue-600 shadow-sm transition-all whitespace-nowrap">Executives</button>
            <button onclick="showTab('representatives')" id="btn-representatives" class="flex-1 px-4 py-3 rounded-md text-slate-600 transition-all whitespace-nowrap">Representatives</button>
            <button onclick="showTab('committees')" id="btn-committees" class="flex-1 px-4 py-3 rounded-md text-slate-600 transition-all whitespace-nowrap">Committees</button>
        </div>

        <div id="panel-executive" class="space-y-6"></div>
        <div id="panel-representatives" class="hidden grid md:grid-cols-3 gap-6"></div>
        <div id="panel-committees" class="hidden space-y-6"></div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const GID_ROSTER = "416625956";
        const CONFIG_GID = "229901204";

        async function init() {
            const confRes = await fetch(`${CSV_URL}&gid=${CONFIG_GID}`);
            const data = (await confRes.text()).split('\n').map(r => r.split(','));
            const config = Object.fromEntries(data.map(r => [r[0]?.trim(), r[1]?.trim()]));
            
            const logo = document.getElementById('header-logo');
            if(config['IMG_LOGO_URL']) { logo.src = config['IMG_LOGO_URL']; logo.classList.remove('hidden'); document.getElementById('header-text').classList.add('hidden'); }
            
            const assign = (ids, key) => ids.forEach(id => { const el = document.getElementById(id); if(el && config[key]) el.href = config[key]; });
            assign(['nav-1', 'mnav-1'], 'LINK_1_PATH');
            assign(['nav-2', 'mnav-2'], 'LINK_2_PATH');
            assign(['nav-3', 'mnav-3'], 'LINK_3_PATH');
            assign(['nav-4', 'mnav-4'], 'LINK_4_PATH');
            fetchRoster();
        }

        function showTab(t) {
            document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('panel-' + t).classList.remove('hidden');
            document.querySelectorAll('#tab-group button').forEach(b => {
                b.className = b.id === 'btn-'+t ? "flex-1 px-4 py-3 rounded-md bg-white text-blue-600 shadow-sm transition-all whitespace-nowrap" : "flex-1 px-4 py-3 rounded-md text-slate-600 transition-all whitespace-nowrap";
            });
        }

        async function fetchRoster() {
            const res = await fetch(`${CSV_URL}&gid=${GID_ROSTER}`);
            const rows = (await res.text()).split('\n').map(r => r.split(','));
            let execs = [], reps = {7:[], 8:[], 9:[], 10:[], 11:[], 12:[]}, comms = {};

            for(let i = 1; i < rows.length; i++) {
                let [name, role, img, commRaw] = [rows[i][0]?.trim(), rows[i][1]?.trim(), rows[i][2]?.trim(), rows[i][3]?.trim()];
                if(!name) continue;
                let rl = role.toLowerCase();
                
                if(rl.match(/president|secretary|treasurer|auditor|public information officer|protocol|vice/)) execs.push({name, role, img});
                else if(rl.includes('grade')) {
                    let g = rl.match(/\d+/);
                    if(g && reps[g[0]]) reps[g[0]].push(name);
                }
                if(commRaw) {
                    let parts = commRaw.split(' ');
                    let pos = parts.pop();
                    let cName = parts.join(' ');
                    if(!comms[cName]) comms[cName] = {Chair:[], Co:[], Mem:[]};
                    if(pos === 'Chairperson') comms[cName].Chair.push(name);
                    else if(pos === 'Co-Chairperson') comms[cName].Co.push(name);
                    else comms[cName].Mem.push(name);
                }
            }

            // Render logic
            const pPanel = document.getElementById('panel-executive');
            const pres = execs.find(e => e.role.toLowerCase().includes('president'));
            pPanel.innerHTML = pres ? `<div class="bg-white p-6 rounded-2xl border text-center mx-auto w-64"><img src="${pres.img}" class="w-24 h-24 rounded-lg mx-auto mb-4 object-cover"><p class="font-black text-lg">${pres.name}</p><p class="text-blue-600 font-bold text-sm">${pres.role}</p></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${execs.filter(e => e !== pres).map(e => `<div class="bg-white p-4 rounded-xl border text-center"><img src="${e.img}" class="w-16 h-16 rounded-lg mx-auto mb-2 object-cover"><p class="font-bold text-sm">${e.name}</p><p class="text-blue-600 font-bold text-[10px] uppercase">${e.role}</p></div>`).join('')}</div>` : "";

            const rPanel = document.getElementById('panel-representatives');
            [[7,8], [9,10], [11,12]].forEach(pair => {
                rPanel.innerHTML += `<div class="bg-white p-6 rounded-2xl border"><h3 class="text-blue-600 font-black text-sm uppercase mb-4">Grade ${pair[0]} & ${pair[1]}</h3><ul>${pair.map(g => reps[g].map(n => `<li class="py-1 text-sm">${n}</li>`).join('')).join('')}</ul></div>`;
            });

            const cPanel = document.getElementById('panel-committees');
            for(let name in comms) {
                cPanel.innerHTML += `<div class="bg-white p-6 rounded-2xl border"><h4 class="font-black text-lg mb-4">${name}</h4>
                <p class="font-bold text-sm">Chair: <span class="text-blue-600">${comms[name].Chair.join(', ') || 'TBD'}</span></p>
                <p class="font-bold text-sm mb-4">Co-Chair: <span class="text-blue-600">${comms[name].Co.join(', ') || 'TBD'}</span></p>
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">Members</p>
                <ul class="list-disc pl-5 text-sm">${comms[name].Mem.map(m => `<li>${m}</li>`).join('')}</ul></div>`;
            }
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
