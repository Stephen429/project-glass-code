<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Clubs & Organizations | Project GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap'); 
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #header-logo { display: none; }
        .logo-loaded #header-logo { display: block; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
    <header class="border-b border-slate-100 sticky top-0 z-50 bg-white">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a id="logo-link" href="#" class="flex items-center">
                <img id="header-logo" src="" class="h-8" alt="Logo">
            </a>
            <nav id="nav-links" class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-slate-500"></nav>
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 text-slate-600"><i data-lucide="menu"></i></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-100 bg-white px-4 py-2 space-y-1 text-xs font-bold uppercase text-slate-500 flex flex-col"></div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-4 py-12 fade-in">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black mb-4">Clubs & Organizations</h1>
            <p class="text-slate-500 max-w-lg mx-auto text-sm">Explore the various student-led clubs and organizations at Lydia D. Villangca Trade School.</p>
        </div>

        <div id="clubs-container" class="grid md:grid-cols-2 gap-6 mb-16">
            <p class="text-slate-400 text-sm">Loading organizations...</p>
        </div>
    </main>

    <footer class="border-t bg-white mt-auto py-8 text-center text-xs font-bold uppercase text-slate-400">
        <p>© 2026 Project GLASS. All rights reserved.</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const CONFIG_GID = "229901204";
        const CLUBS_GID = "1803510665"; 

        async function init() {
            // Load Config
            const confRes = await fetch(`${CSV_URL}&gid=${CONFIG_GID}`);
            const data = (await confRes.text()).split('\n').map(r => r.split(','));
            const config = Object.fromEntries(data.map(r => [r[0]?.trim(), r[1]?.trim()]));
            
            // Header Logic
            const logo = document.getElementById('header-logo');
            const logoLink = document.getElementById('logo-link');
            if(config['IMG_LOGO_URL']) { logo.src = config['IMG_LOGO_URL']; logoLink.parentElement.parentElement.classList.add('logo-loaded'); }
            logoLink.href = config['LINK_0_PATH'] || 'index.html';
            
            const pages = [{name:'Home', id:'0'}, {name:'Gazettes', id:'1'}, {name:'Officers', id:'2'}, {name:'Feedback', id:'3'}, {name:'About Us', id:'5'}];
            pages.forEach(p => {
                const url = config[`LINK_${p.id}_PATH`] || '#';
                document.getElementById('nav-links').innerHTML += `<a href="${url}" class="text-slate-500 hover:text-blue-600 text-sm">${p.name}</a>`;
                document.getElementById('mobile-menu').innerHTML += `<a href="${url}" class="block py-3 px-2 text-slate-500 border-b border-slate-50 text-xs">${p.name}</a>`;
            });

            // Load Clubs Data
            try {
                const clubsRes = await fetch(`${CSV_URL}&gid=${CLUBS_GID}`);
                const clubsText = await clubsRes.text();
                const clubsData = clubsText.split('\n').slice(1); // Remove header row
                const container = document.getElementById('clubs-container');
                container.innerHTML = '';
                
                clubsData.forEach(row => {
                    const [name, fbUrl, logoUrl] = row.split(',').map(item => item.trim());
                    if (!name) return;
                    
                    container.innerHTML += `
                        <a href="${fbUrl || '#'}" target="_blank" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center space-x-4 hover:border-blue-600 transition-colors">
                            <img src="${logoUrl || 'https://via.placeholder.com/64'}" class="w-16 h-16 rounded-2xl object-cover bg-slate-100" alt="${name}" onerror="this.src='https://via.placeholder.com/64'">
                            <div>
                                <h3 class="font-bold text-slate-800">${name}</h3>
                                <p class="text-xs text-blue-600 font-bold uppercase mt-1">Visit Page</p>
                            </div>
                        </a>
                    `;
                });
            } catch(e) { 
                console.error("Error fetching clubs:", e);
                document.getElementById('clubs-container').innerHTML = `<p class="text-red-500 text-sm">Failed to load clubs. Please check your GID.</p>`;
            }
            
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
