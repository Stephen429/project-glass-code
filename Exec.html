<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }
    </style>
</head>
<body class="bg-transparent p-2">

    <div class="max-w-4xl mx-auto bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8">
        
        <!-- Header Ribbon -->
        <div class="border-b border-slate-100 pb-4 mb-8 flex flex-col sm:flex-row justify-between items-center gap-2">
            <div class="text-center sm:text-left">
                <span class="text-[10px] font-bold tracking-widest text-blue-600 uppercase">Supreme Secondary Learner Government</span>
                <h3 class="text-xl font-bold text-slate-900 tracking-tight mt-0.5">THE EXECUTIVE COUNCIL</h3>
            </div>
            <span class="text-[10px] bg-blue-50 text-blue-600 px-2.5 py-1 rounded-md font-mono uppercase font-bold tracking-wide border border-blue-100">
                Term: 2026-2027
            </span>
        </div>

        <div id="roster-loading" class="py-12 text-center text-xs text-slate-400 font-medium">
            <svg class="animate-spin h-5 w-5 mx-auto mb-2 text-blue-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Syncing executive ledger profiles...
        </div>

        <!-- Dynamic Output Wrapper -->
        <div id="roster-wrapper" class="hidden space-y-8">
            <!-- Apex Spot (President) -->
            <div id="president-spotlight" class="flex justify-center"></div>
            
            <!-- Descending Executive Council Grid -->
            <div id="officers-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

    </div>

    <script>
        // 1. Paste your base published Google Sheet CSV URL here
        const BASE_SHEET_URL = "YOUR_BASE_PUBLISHED_CSV_LINK";
        
        // 2. Paste the specific GID number for your OFFICERS tab here
        const OFFICERS_TAB_GID = "PASTE_OFFICERS_TAB_GID_HERE";

        // SVG Placeholder Avatar used when no image link is found in the spreadsheet
        const AVATAR_PLACEHOLDER = `<svg class="w-12 h-12 text-slate-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

        function parseCSV(text) {
            let lines = []; let row = [""]; let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let n = text[i+1];
                if (c === '"') { if (q && n === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && n === '\n') i++; lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row); return lines;
        }

        async function fetchRoster() {
            // Local fallback simulation if setup variables are still placeholders
            if (BASE_SHEET_URL.includes("YOUR_BASE_PUBLISHED_CSV")) {
                renderRoster([
                    ["Loraine Banania", "SSLG President", ""],
                    ["James Paul Sabanal", "SSLG Vice President", ""],
                    ["Tristan Lhoyd Tabligan", "SSLG Secretary", ""],
                    ["Warren Josh Elizalde", "SSLG Treasurer", ""],
                    ["Alliyah Kate Enrile", "SSLG Auditor", ""]
                ]);
                return;
            }

            try {
                const response = await fetch(`${BASE_SHEET_URL}&gid=${OFFICERS_TAB_GID}`);
                const rawData = await response.text();
                const rows = parseCSV(rawData);
                
                let rosterData = [];
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length >= 2 && rows[i][0].trim()) {
                        rosterData.push([rows[i][0].trim(), rows[i][1].trim(), rows[i][2] ? rows[i][2].trim() : ""]);
                    }
                }
                renderRoster(rosterData);
            } catch (error) {
                console.error("Roster synchronization error:", error);
                document.getElementById("roster-loading").innerHTML = `<span class="text-red-500 font-medium">Failed to synchronize executive council profiles.</span>`;
            }
        }

        function renderRoster(data) {
            document.getElementById("roster-loading").classList.add("hidden");
            const wrapper = document.getElementById("roster-wrapper");
            const presSpotlight = document.getElementById("president-spotlight");
            const grid = document.getElementById("officers-grid");
            
            presSpotlight.innerHTML = "";
            grid.innerHTML = "";
            wrapper.classList.remove("hidden");

            data.forEach((officer, index) => {
                const name = officer[0];
                const role = officer[1];
                const imgUrl = officer[2];
                
                // Construct clean avatar frame handling broken or missing links natively
                const avatarMarkup = imgUrl 
                    ? `<img src="${imgUrl}" alt="${name}" class="w-full h-full object-cover" onerror="this.onerror=null; this.parentElement.innerHTML='${AVATAR_PLACEHOLDER}';">`
                    : AVATAR_PLACEHOLDER;

                // Force layout protocol logic: Check if current item is the President
                const isPresident = role.toLowerCase().includes("president") && !role.toLowerCase().includes("vice");

                if (isPresident) {
                    presSpotlight.innerHTML = `
                        <div class="w-full max-w-sm bg-gradient-to-b from-blue-50/70 to-white border border-blue-100 rounded-xl p-6 text-center relative overflow-hidden shadow-sm hover:shadow-md transition-all duration-200">
                            <div class="absolute top-0 right-0 bg-blue-600 text-white px-3 py-0.5 text-[9px] uppercase tracking-widest font-bold rounded-bl">Presiding Chair</div>
                            <div class="w-24 h-24 bg-slate-100 rounded-full mx-auto mb-4 border-2 border-blue-500 shadow-inner overflow-hidden flex items-center justify-center">
                                ${avatarMarkup}
                            </div>
                            <h4 class="font-bold text-slate-900 text-base leading-snug">${name}</h4>
                            <p class="text-xs font-semibold text-blue-600 uppercase tracking-wider mt-0.5">${role}</p>
                        </div>
                    `;
                } else {
                    grid.innerHTML += `
                        <div class="bg-white border border-slate-200 hover:border-slate-300 rounded-xl p-4 text-center shadow-sm hover:shadow-md transition-all duration-200 flex flex-col items-center">
                            <div class="w-16 h-16 bg-slate-50 rounded-full mb-3 border border-slate-100 shadow-inner overflow-hidden flex items-center justify-center">
                                ${avatarMarkup}
                            </div>
                            <h4 class="font-bold text-slate-800 text-xs leading-tight line-clamp-1">${name}</h4>
                            <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wide mt-1">${role.replace("SSLG ", "")}</p>
                        </div>
                    `;
                }
            });
        }

        window.onload = fetchRoster;
    </script>
</body>
</html>
