<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project GLASS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { opacity: 0; animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-start { scroll-snap-align: start; }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-blue-600 text-white border-b border-blue-700 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <a id="logo-link" href="#" class="font-black text-xl tracking-tighter">PROJECT GLASS</a>
            <nav id="nav-links" class="hidden md:flex items-center space-x-6 text-xs font-bold uppercase text-blue-100"></nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12 space-y-16">
        
        <section class="animate-in bg-blue-50 p-10 rounded-3xl border border-blue-100">
            <h1 class="text-5xl font-black tracking-tight mb-4 text-blue-900">A clear window into student leadership.</h1>
            <p class="text-blue-700 max-w-2xl mb-8">Governance, Leadership, Accountability & Student Services. We ensure every policy and student asset is openly accessible.</p>
        </section>

        <section class="animate-in">
            <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">By the Numbers</h3>
            <div id="metrics-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section class="animate-in">
            <h2 class="text-xl font-bold mb-6">Latest Updates</h2>
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section class="animate-in w-full">
            <h2 class="text-2xl font-bold mb-2">SSLG in Action</h2>
            <div class="w-full overflow-hidden">
                <div id="action-carousel" class="flex gap-4 overflow-x-auto pb-4 snap-x"></div>
            </div>
        </section>
    </main>

    <footer class="border-t bg-white mt-12 py-8">
        <div class="max-w-4xl mx-auto px-4 text-center text-xs font-bold uppercase text-slate-400">
            <p>&copy; 2026 Project GLASS. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const MASTER_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIFgXyOttJeJGsVaLwfFtNWb-c1YCJiJ8R5siL32ykA47xYYY7b8KmPXm_42vNAbaHXOkcqEG3tRCu/pub?output=csv";
        const CONFIG_GID = "229901204", NEWS_GID = "1683102947", METRICS_GID = "1647929887";

        async function init() {
            const confRes = await fetch(`${MASTER_SHEET_URL}&gid=${CONFIG_GID}`);
            const confData = (await confRes.text()).split('\n').map(r => r.split(','));
            const config = Object.fromEntries(confData.map(r => [r[0]?.trim(), r[1]?.trim()]));

            // Navigation
            const pages = [{name:'Home', id:'0'}, {name:'Gazettes', id:'1'}, {name:'Officers', id:'2'}, {name:'Feedback', id:'3'}, {name:'About', id:'5'}];
            pages.forEach(p => {
                const url = config[`LINK_${p.id}_PATH`] || '#';
                document.getElementById('nav-links').innerHTML += `<a href="${url}" class="hover:text-white">${p.name}</a>`;
            });

            // Metrics
            fetch(`${MASTER_SHEET_URL}&gid=${METRICS_GID}`).then(r => r.text()).then(t => {
                const rows = t.split('\n').slice(1);
                const container = document.getElementById('metrics-container');
                rows.forEach(r => {
                    const [label, val] = r.split(',');
                    if(label) container.innerHTML += `<div class="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm"><span class="text-[10px] uppercase font-bold text-slate-400">${label}</span><div class="text-2xl font-black text-blue-600">${val}</div></div>`;
                });
            });

            // 3-Card News Grid
            fetch(`${MASTER_SHEET_URL}&gid=${NEWS_GID}`).then(r => r.text()).then(t => {
                const rows = t.split('\n').slice(1).filter(r => r.trim() !== "");
                const grid = document.getElementById('news-grid');
                rows.slice(0, 3).forEach(row => {
                    const [headline, desc, link] = row.split(',');
                    grid.innerHTML += `
                        <a href="${link?.trim() || '#'}" class="group block p-6 bg-white border border-slate-100 rounded-3xl shadow-sm hover:border-blue-600 transition-all">
                            <div class="text-[10px] uppercase font-bold text-blue-600 mb-2 tracking-widest">News</div>
                            <h3 class="font-bold text-lg mb-2 group-hover:text-blue-600">${headline}</h3>
                            <p class="text-sm text-slate-500">${desc}</p>
                        </a>`;
                });
            });

            // Carousel
            const imgs = config.ACTION_IMAGES?.split('|') || [];
            const carousel = document.getElementById('action-carousel');
            imgs.forEach(url => { 
                carousel.innerHTML += `<div class="flex-shrink-0 snap-start w-[300px] h-56 rounded-2xl overflow-hidden bg-slate-200"><img src="${url.trim()}" class="w-full h-full object-cover"></div>`; 
            });
        }
        init();
    </script>
</body>
</html>
