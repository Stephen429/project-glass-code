<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; }
    </style>
</head>
<body class="bg-transparent p-1">

    <div class="max-w-4xl mx-auto bg-white border border-slate-200 rounded-xl shadow-sm p-4 sm:p-6">
        
        <!-- Header Banner Frame -->
        <div class="border-b border-slate-100 pb-3 mb-5 flex flex-col sm:flex-row justify-between items-center text-center sm:text-left gap-1.5">
            <div>
                <span class="text-[9px] font-bold tracking-widest text-blue-600 uppercase">Supreme Secondary Learner Government</span>
                <h3 class="text-lg font-bold text-slate-900 tracking-tight">THE EXECUTIVE COUNCIL</h3>
            </div>
            <span class="text-[9px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-mono uppercase font-bold border border-blue-100">
                2026-2027
            </span>
        </div>

        <div id="roster-loading" class="py-6 text-center text-xs text-slate-400">
            Syncing executive ledger profiles...
        </div>

        <div id="roster-wrapper" class="hidden space-y-5">
            <!-- Apex Spot (President) -->
            <div id="president-spotlight" class="flex justify-center"></div>
            
            <!-- Dynamic Grid: 1-col on tiny screens, 2-col on mobile, 4-col on desktop -->
            <div id="officers-grid" class="grid grid-cols-1 xs:grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-2.5 sm:gap-4"></div>
        </div>

    </div>

    <script>
        const BASE_SHEET_URL = "YOUR_BASE_PUBLISHED_CSV_LINK";
        const OFFICERS_TAB_GID = "PASTE_OFFICERS_TAB_GID_HERE";
        const AVATAR_PLACEHOLDER = `<svg class="w-10 h-10 text-slate-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

        function parseCSV(text) {
            let lines = []; let row = [""]; let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let n = text[i+1];
                if (c === '"') { if (q && n === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; } }
                else if (c === ',' && !q) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && n === '\n') i++; lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row); return lines;
        }

        async function fetchRoster() {
            if (BASE_SHEET_URL.includes("YOUR_BASE_PUBLISHED_CSV")) {
                renderRoster([
                    ["Loraine Banania", "SSLG President", ""],
                    ["James Paul Sabanal", "SSLG Vice President", ""],
                    ["Tristan Lhoyd Tabligan", "SSLG Secretary", ""],
                    ["Warren Josh Elizalde", "SSLG Treasurer", ""],
                    ["Alliyah Kate Enrile", "SSLG Auditor", ""]
                ]);
                return;
            }
            try {
                const response = await fetch(`${BASE_SHEET_URL}&gid=${OFFICERS_TAB_GID}`);
                const rawData = await response.text();
                const rows = parseCSV(rawData);
                let rosterData = [];
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length >= 2 && rows[i][0].trim()) {
                        rosterData.push([rows[i][0].trim(), rows[i][1].trim(), rows[i][2] ? rows[i][2].trim() : ""]);
                    }
                }
                renderRoster(rosterData);
            } catch (error) {
                document.getElementById("roster-loading").innerHTML = `<span class="text-red-500 text-xs">Sync error.</span>`;
            }
        }

        function renderRoster(data) {
            document.getElementById("roster-loading").classList.add("hidden");
            const wrapper = document.getElementById("roster-wrapper");
            const presSpotlight = document.getElementById("president-spotlight");
            const grid = document.getElementById("officers-grid");
            
            presSpotlight.innerHTML = "";
            grid.innerHTML = "";
            wrapper.classList.remove("hidden");

            data.forEach((officer) => {
                const name = officer[0];
                const role = officer[1];
                const imgUrl = officer[2];
                
                const avatarMarkup = imgUrl 
                    ? `<img src="${imgUrl}" alt="${name}" class="w-full h-full object-cover" onerror="this.onerror=null; this.parentElement.innerHTML='${AVATAR_PLACEHOLDER}';">`
                    : AVATAR_PLACEHOLDER;

                const isPresident = role.toLowerCase().includes("president") && !role.toLowerCase().includes("vice");

                if (isPresident) {
                    presSpotlight.innerHTML = `
                        <div class="w-full max-w-xs bg-gradient-to-b from-blue-50/50 to-white border border-blue-100 rounded-xl p-4 text-center relative overflow-hidden shadow-sm">
                            <div class="absolute top-0 right-0 bg-blue-600 text-white px-2 py-0.5 text-[8px] uppercase tracking-widest font-bold rounded-bl">Presiding</div>
                            <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-2 border border-blue-500 shadow-inner overflow-hidden flex items-center justify-center">
                                ${avatarMarkup}
                            </div>
                            <h4 class="font-bold text-slate-900 text-sm leading-tight">${name}</h4>
                            <p class="text-[10px] font-semibold text-blue-600 uppercase tracking-wider mt-0.5">${role}</p>
                        </div>
                    `;
                } else {
                    grid.innerHTML += `
                        <div class="bg-white border border-slate-200 rounded-xl p-3 text-center shadow-sm flex flex-col items-center justify-center">
                            <div class="w-12 h-12 bg-slate-50 rounded-full mb-2 border border-slate-100 shadow-inner overflow-hidden flex items-center justify-center">
                                ${avatarMarkup}
                            </div>
                            <h4 class="font-bold text-slate-800 text-xs leading-tight line-clamp-1">${name}</h4>
                            <p class="text-[9px] font-medium text-slate-400 uppercase tracking-wide mt-0.5">${role.replace("SSLG ", "")}</p>
                        </div>
                    `;
                }
            });
        }
        window.onload = fetchRoster;
    </script>
</body>
</html>
